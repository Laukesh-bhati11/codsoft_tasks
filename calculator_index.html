<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Grid Calculator</title>
    <link rel="stylesheet" href="calculator_style.css">
</head>
<body>

    <div class="calculator-container">
        <div class="calculator">
            <!-- Screen Display -->
            <div class="display" id="display">0</div>
            
            <!-- Button Pad (CSS Grid) -->
            <div class="buttons-grid">
                <button class="btn ctrl" data-action="clear">C</button>
                <button class="btn ctrl" data-action="backspace">⌫</button>
                <button class="btn op" data-action="operator" data-val="/">/</button>
                <button class="btn op" data-action="operator" data-val="*">×</button>

                <button class="btn num" data-val="7">7</button>
                <button class="btn num" data-val="8">8</button>
                <button class="btn num" data-val="9">9</button>
                <button class="btn op" data-action="operator" data-val="-">-</button>

                <button class="btn num" data-val="4">4</button>
                <button class="btn num" data-val="5">5</button>
                <button class="btn num" data-val="6">6</button>
                <button class="btn op" data-action="operator" data-val="+">+</button>

                <button class="btn num" data-val="1">1</button>
                <button class="btn num" data-val="2">2</button>
                <button class="btn num" data-val="3">3</button>
                
                <!-- Equals Key spans rows dynamically -->
                <button class="btn eq" id="equals">=</button>

                <button class="btn num zero" data-val="0">0</button>
                <button class="btn num" data-val=".">.</button>
            </div>
        </div>
    </div>

    <script src="calculator_script.js"></script>
</body>
</html>
